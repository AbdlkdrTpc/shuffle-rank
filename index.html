   ================================================================ */

function $(id) { return document.getElementById(id); }

function getCardPalette(name) {
  var hash = 0;
  for (var i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return CARD_PALETTES[Math.abs(hash) % CARD_PALETTES.length];
}

function cardGradient(name) {
  var p = getCardPalette(name);
  return 'linear-gradient(145deg, ' + p[0] + ' 0%, ' + p[1] + ' 100%)';
}

function randomFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function cleanFileName(name) {
  return name.replace(/\.[^/.]+$/, '').replace(/[_\-]+/g, ' ')
    .replace(/\b\w/g, function(c) { return c.toUpperCase(); }).trim();
}

function showToast(msg) {
  var el = $('toast');
  el.textContent = msg;
  el.classList.add('visible');
  clearTimeout(el._timer);
  el._timer = setTimeout(function() { el.classList.remove('visible'); }, 2000);
}

/* Auto-resize textarea */
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

/* ================================================================
   SOL PANEL
   ================================================================ */

function initPanel() {
  panelItems = items.map(function(it) { return { name: it.name, image: it.image || null }; });
  renderPanelItems();
}

function renderPanelItems() {
  var list = $('itemList');
  while (list.firstChild) list.removeChild(list.firstChild);

  panelItems.forEach(function(item, idx) {
    var row = document.createElement('div');
    row.className = 'item-row';

    if (item.image) {
      var img = document.createElement('img');
      img.className = 'item-row__thumb';
      img.src = item.image;
      img.alt = item.name;
      row.appendChild(img);
    } else {
      var ph = document.createElement('div');
      ph.className = 'item-row__thumb-placeholder';
      ph.style.background = cardGradient(item.name || 'X');
      ph.textContent = (item.name || 'X').charAt(0).toUpperCase();
      row.appendChild(ph);
    }

    var inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'item-row__name';
    inp.value = item.name;
    inp.placeholder = 'Isim gir...';
    (function(index) {
      inp.addEventListener('input', function() { panelItems[index].name = this.value; });
    })(idx);
    row.appendChild(inp);

    var del = document.createElement('button');
    del.className = 'item-row__delete';
    del.textContent = '\u00d7';
    (function(index) {
      del.addEventListener('click', function() { panelItems.splice(index, 1); renderPanelItems(); });
    })(idx);
    row.appendChild(del);

    list.appendChild(row);
  });
}

function markPanelItemPlaced(name) {
  var rows = $('itemList').querySelectorAll('.item-row');
  rows.forEach(function(row) {
    var inp = row.querySelector('.item-row__name');
    if (inp && inp.value === name && !row.classList.contains('placed')) {
      row.classList.add('placed');
    }
  });
}

function clearPanelPlaced() {
  var rows = $('itemList').querySelectorAll('.item-row.placed');
  rows.forEach(function(row) { row.classList.remove('placed'); });
}

function handleFileUpload(files) {
  if (!files || files.length === 0) return;
  var remaining = 10 - panelItems.length;
  if (remaining <= 0) { showToast('Maksimum 10 oge eklenebilir'); return; }

  var toProcess = Array.prototype.slice.call(files, 0, remaining);
  if (files.length > remaining) showToast('Sadece ' + remaining + ' gorsel eklendi (max 10)');

  toProcess.forEach(function(file) {
    if (!file.type.startsWith('image/')) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      if (panelItems.length >= 10) return;
      panelItems.push({ name: cleanFileName(file.name), image: e.target.result });
      renderPanelItems();
    };
    reader.readAsDataURL(file);
  });
}

function addManualItem() {
  if (panelItems.length >= 10) { showToast('Maksimum 10 oge eklenebilir'); return; }
  panelItems.push({ name: '', image: null });
  renderPanelItems();
  var inputs = $('itemList').querySelectorAll('.item-row__name');
  if (inputs.length > 0) inputs[inputs.length - 1].focus();
}

function applyPanelItems() {
  var valid = panelItems.filter(function(it) { return it.name.trim().length > 0; });
  if (valid.length === 0) { showToast('En az bir oge ekle'); return; }
  if (valid.length > 10) { showToast('Maksimum 10 oge! Fazlaliklari sil'); return; }

  items = valid.map(function(it) { return { name: it.name.trim(), image: it.image }; });
  CONFIG.slotCount = items.length;
  resetAll();
  showToast(items.length + ' oge yuklendi');
}

$('uploadZone').addEventListener('click', function() { $('fileInput').click(); });
$('fileInput').addEventListener('change', function() { handleFileUpload(this.files); this.value = ''; });
$('btnAddManual').addEventListener('click', addManualItem);
$('btnApplyItems').addEventListener('click', applyPanelItems);

$('uploadZone').addEventListener('dragover', function(e) {
  e.preventDefault(); this.style.borderColor = 'var(--accent)'; this.style.background = 'var(--accent-light)';
});
$('uploadZone').addEventListener('dragleave', function() { this.style.borderColor = ''; this.style.background = ''; });
$('uploadZone').addEventListener('drop', function(e) {
  e.preventDefault(); this.style.borderColor = ''; this.style.background = '';
  handleFileUpload(e.dataTransfer.files);
});

/* ================================================================
   VIDEO UI
   ================================================================ */

function updateCounter() {
  // Counter kaldirildi, fonksiyon uyumluluk icin bos kaliyor
}

function renderCard(item) {
  CanvasRenderer._displayItem = item;
  var area = $('cardImageArea');
  var gradBg = $('cardGradientBg');
  var mono = $('cardMonogram');

  var oldImg = area.querySelector('.card__image');
  if (oldImg) oldImg.remove();

  if (item.image) {
    gradBg.style.display = 'none';
    mono.style.display = 'none';
    var img = document.createElement('img');
    img.className = 'card__image';
    img.src = item.image;
    img.alt = item.name;
    area.appendChild(img);
  } else {
    gradBg.style.display = '';
    gradBg.style.background = cardGradient(item.name);
    mono.style.display = '';
    mono.textContent = item.name.charAt(0).toUpperCase();
  }
  $('cardName').textContent = item.name;
}

function showStack(visible) {
  $('cardStack').style.display = visible ? 'block' : 'none';
  $('placeholder').style.display = visible ? 'none' : 'flex';
  if (!visible) CanvasRenderer._displayItem = null;
}

function buildSlots() {
  var strip = $('rankStrip');
  while (strip.firstChild) strip.removeChild(strip.firstChild);
  state.slots = new Array(CONFIG.slotCount).fill(null);

  for (var i = 0; i < CONFIG.slotCount; i++) {
    var slot = document.createElement('div');
    slot.className = 'rank-slot';
    slot.dataset.index = i;

    var num = document.createElement('span');
    num.className = 'rank-slot__number';
    num.textContent = String(i + 1);

    var thumb = document.createElement('div');
    thumb.className = 'rank-slot__thumb';

    var name = document.createElement('span');
    name.className = 'rank-slot__name';

    slot.appendChild(num);
    slot.appendChild(thumb);
    slot.appendChild(name);

    (function(index) {
      slot.addEventListener('click', function() { placeCard(index); });
    })(i);

    strip.appendChild(slot);
  }
}

function updateSlotUI(index) {
  var slotEl = $('rankStrip').children[index];
  var item = state.slots[index];
  var thumbEl = slotEl.querySelector('.rank-slot__thumb');

  if (item) {
    slotEl.classList.remove('selectable');
    slotEl.classList.add('filled', 'just-placed');
    slotEl.querySelector('.rank-slot__name').textContent = item.name;

    while (thumbEl.firstChild) thumbEl.removeChild(thumbEl.firstChild);
    if (item.image) {
      var img = document.createElement('img');
      img.src = item.image;
      img.alt = item.name;
      thumbEl.appendChild(img);
    } else {
      var grad = document.createElement('div');
      grad.className = 'rank-slot__thumb-gradient';
      grad.style.background = cardGradient(item.name);
      grad.textContent = item.name.charAt(0).toUpperCase();
      thumbEl.appendChild(grad);
    }

    setTimeout(function() { slotEl.classList.remove('just-placed'); }, 450);
  } else {
    slotEl.classList.remove('filled', 'selectable');
    slotEl.querySelector('.rank-slot__name').textContent = '';
    while (thumbEl.firstChild) thumbEl.removeChild(thumbEl.firstChild);
  }
}

function setSlotsSelectable(selectable) {
  var slots = $('rankStrip').children;
  for (var i = 0; i < slots.length; i++) {
    if (!state.slots[i]) slots[i].classList.toggle('selectable', selectable);
  }
}

function setButtonStates() {
  // Placeholder metnini guncelle
  var ph = $('placeholder');
  if (state.available.length === 0) {
    ph.textContent = 'BITTI';
    ph.style.cursor = 'default';
  } else {
    ph.textContent = 'KARISTIR';
    ph.style.cursor = 'pointer';
  }
}

/* ================================================================
   PARTICLES
   ================================================================ */

function emitParticles(cardName) {
  var area = $('shuffleArea');
  var rect = $('cardStack').getBoundingClientRect();
  var areaRect = area.getBoundingClientRect();
  var cx = rect.left + rect.width / 2 - areaRect.left;
  var cy = rect.top + rect.height / 2 - areaRect.top;
  var palette = getCardPalette(cardName);

  for (var i = 0; i < 10; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    var angle = (Math.PI * 2 * i) / 10 + (Math.random() - 0.5) * 0.4;
    var dist = 35 + Math.random() * 40;
    var px = Math.cos(angle) * dist;
    var py = Math.sin(angle) * dist;
    var size = 3 + Math.random() * 3;
    var dur = 0.35 + Math.random() * 0.2;

    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    p.style.background = Math.random() > 0.5 ? palette[0] : palette[1];
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.setProperty('--px', px + 'px');
    p.style.setProperty('--py', py + 'px');
    p.style.animation = 'particleBurst ' + dur + 's ease-out forwards';

    area.appendChild(p);
    (function(el) { setTimeout(function() { el.remove(); }, 700); })(p);
  }
}

function emitConfetti() {
  var colors = ['#7c5cfc', '#f472b6', '#fbbf24', '#34d399', '#60a5fa', '#fb923c'];
  var frame = $('videoFrame');
  var frameRect = frame.getBoundingClientRect();

  for (var i = 0; i < 30; i++) {
    var piece = document.createElement('div');
    piece.className = 'confetti-piece';
    var color = colors[Math.floor(Math.random() * colors.length)];
    piece.style.background = color;
    piece.style.left = (frameRect.left + Math.random() * frameRect.width) + 'px';
    piece.style.top = (frameRect.top - 10) + 'px';
    piece.style.width = (4 + Math.random() * 6) + 'px';
    piece.style.height = (4 + Math.random() * 6) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.setProperty('--fall-y', (frameRect.height + 50) + 'px');
    piece.style.setProperty('--fall-rot', (Math.random() * 720 - 360) + 'deg');
    piece.style.setProperty('--fall-duration', (1 + Math.random() * 1) + 's');
    piece.style.animationDelay = (Math.random() * 0.5) + 's';

    document.body.appendChild(piece);
    (function(el) { setTimeout(function() { el.remove(); }, 2500); })(piece);
  }
}

function showFinalReveal() {
  var vBody = document.querySelector('.v-body');
  vBody.classList.add('final-reveal');

  // Slotlari sirayla parlat
  var slots = $('rankStrip').children;
  for (var i = 0; i < slots.length; i++) {
    (function(slot, delay) {
      setTimeout(function() {
        slot.classList.add('final-glow');
      }, delay);
    })(slots[i], 300 + i * 100);
  }
}

function hideFinalReveal() {
  var vBody = document.querySelector('.v-body');
  vBody.classList.remove('final-reveal');
  var slots = $('rankStrip').children;
  for (var i = 0; i < slots.length; i++) {
    slots[i].classList.remove('final-glow');
  }
}

function triggerSlotWave() {
  var slots = $('rankStrip').children;
  for (var i = 0; i < slots.length; i++) {
    (function(slot, delay) {
      setTimeout(function() {
        slot.classList.add('wave-glow');
        setTimeout(function() { slot.classList.remove('wave-glow'); }, 600);
      }, delay);
    })(slots[i], i * 80);
  }
}

/* ================================================================
   SHUFFLE MOTORU
   ================================================================ */

function startShuffle() {
  if (state.isShuffling || state.available.length === 0) return;
  // Secilen kart hala slota atanmadiysa tekrar karistirma
  if (state.isRevealed && state.currentCard) return;

  // Son item — shuffle yapmadan direkt bos slota ata
  if (state.available.length === 1) {
    var lastItem = state.available[0];
    var emptySlot = -1;
    for (var si = 0; si < CONFIG.slotCount; si++) {
      if (!state.slots[si]) { emptySlot = si; break; }
    }
    if (emptySlot >= 0) {
      state.currentCard = lastItem;
      state.isRevealed = true;
      renderCard(lastItem);
      $('cardStack').classList.add('revealed');
      showStack(true);
      setSlotsSelectable(false);
      setTimeout(function() { placeCard(emptySlot); }, 800);
      return;
    }
  }

  state.isShuffling = true;
  state.isRevealed = false;
  state.currentCard = null;

  var frame = $('videoFrame');
  frame.classList.add('shuffling');
  frame.classList.remove('revealed');

  $('selectPrompt').classList.remove('visible');
  setSlotsSelectable(false);
  showStack(true);
  setButtonStates();

  var selectedIndex = Math.floor(Math.random() * state.available.length);
  var selectedCard = state.available[selectedIndex];
  var pool = state.available.length > 3 ? state.available : items.slice();
  var card = $('mainCard');
  var shadows = document.querySelectorAll('.card-shadow');

  var duration = CONFIG.shuffleDuration;
  var startSpeed = CONFIG.shuffleSpeed;
  var slowdownAt = CONFIG.slowdownAt;
  var elapsed = 0;
  var currentSpeed = startSpeed;

  function tick() {
    if (elapsed >= duration) { finishShuffle(selectedCard); return; }

    var progress = elapsed / duration;
    var displayItem = progress > 0.9
      ? (Math.random() > 0.4 ? selectedCard : randomFrom(pool))
      : randomFrom(pool);

    renderCard(displayItem);
    SFX.tick();

    var rot = (Math.random() - 0.5) * 6;
    card.style.setProperty('--rot', rot);
    card.classList.remove('shuffle-enter', 'shuffle-slow');

    void card.offsetWidth;
    card.classList.add(progress > slowdownAt ? 'shuffle-slow' : 'shuffle-enter');

    for (var si = 0; si < shadows.length; si++) {
      var r = (Math.random() - 0.5) * 3;
      var y = 5 + si * 5 + (Math.random() - 0.5) * 2;
      shadows[si].style.transform = 'translateY(' + y + 'px) scale(' + (0.96 - si * 0.04) + ') rotate(' + r + 'deg)';
    }

    if (progress > slowdownAt) {
      var sp = (progress - slowdownAt) / (1 - slowdownAt);
      currentSpeed = startSpeed + (600 - startSpeed) * (sp * sp);
    }

    elapsed += currentSpeed;
    setTimeout(tick, currentSpeed);
  }

  tick();
}

function finishShuffle(selectedCard) {
  state.isShuffling = false;
  state.isRevealed = true;
  state.currentCard = selectedCard;
  SFX.ding();

  var frame = $('videoFrame');
  frame.classList.remove('shuffling');
  frame.classList.add('revealed');

  renderCard(selectedCard);

  var card = $('mainCard');
  card.classList.remove('shuffle-enter', 'shuffle-slow');
  card.classList.add('revealed');
  setTimeout(function() { card.classList.add('shimmer'); }, 100);
  setTimeout(function() { card.classList.remove('shimmer'); }, 1000);

  var shadows = document.querySelectorAll('.card-shadow');
  var rots = [-1, 1.2, -0.5];
  for (var i = 0; i < shadows.length; i++)
    shadows[i].style.transform = 'translateY(' + (5 + i * 5) + 'px) scale(' + (0.96 - i * 0.04) + ') rotate(' + rots[i] + 'deg)';

  $('cardStack').classList.add('revealed');
  emitParticles(selectedCard.name);

  setTimeout(function() {
    $('selectPrompt').classList.add('visible');
    setSlotsSelectable(true);
    setButtonStates();
  }, 350);
}

/* ================================================================
   SLOT YERLESTIRME + UCUS ANIMASYONU
   ================================================================ */

function placeCard(slotIndex) {
  if (!state.currentCard || state.slots[slotIndex]) return;

  var item = state.currentCard;
  state.slots[slotIndex] = item;
  SFX.pop();
  state.available = state.available.filter(function(c) { return c !== item; });
  state.currentCard = null;
  state.isRevealed = true;

  setSlotsSelectable(false);
  $('selectPrompt').classList.remove('visible');

  // Sol panelde ilgili item'i grileştir
  markPanelItemPlaced(item.name);

  flyCardToSlot(item, slotIndex, function() {
    updateSlotUI(slotIndex);
    updateCounter();
    $('cardStack').classList.remove('revealed');
    showStack(false);
    $('videoFrame').classList.remove('revealed');
    state.isRevealed = false;
    setButtonStates();

    if (state.available.length === 0) {
      SFX.complete();
      showFinalReveal();
    } else if (state.available.length === 1) {
      // Son kart kaldi — otomatik bos slota ata
      setTimeout(function() {
        var lastItem = state.available[0];
        var emptySlot = -1;
        for (var si = 0; si < CONFIG.slotCount; si++) {
          if (!state.slots[si]) { emptySlot = si; break; }
        }
        if (emptySlot >= 0) {
          state.currentCard = lastItem;
          state.isRevealed = true;
          renderCard(lastItem);
          $('cardStack').classList.add('revealed');
          showStack(true);
          setSlotsSelectable(false);
          setTimeout(function() { placeCard(emptySlot); }, 800);
        }
      }, 500);
    }
  });
}

function flyCardToSlot(item, slotIndex, callback) {
  // Canvas flying card animasyonu baslat (kayit icin)
  if (Recorder.isRecording) {
    var W = 1080, H = 1920;
    var hPadX = 28, hPadTop = 28, hPadBot = 20;
    var ctx = Recorder.canvasCtx;
    var titleText = $('topicTitle').value || '';
    ctx.font = '700 52px "DM Sans", sans-serif';
    var titleLines = CanvasRenderer.wrapText(ctx, titleText, W - 2*hPadX - 88);
    var counterH = ($('headerCounter').value) ? 36 : 0;
    var twH = 36 + counterH + titleLines.length * 64 + 32;
    var headerBottom = hPadTop + twH + hPadBot;
    var bodyPadX = 24, bodyPadBot = 24, bodyGap = 20;
    var bodyY = headerBottom;
    var bodyH = H - bodyY - bodyPadBot;
    var slotGap = 8;
    var slotCount = CONFIG.slotCount;
    var rankW = 360;
    var rankX = bodyPadX;
    var slotH = Math.floor((bodyH - (slotCount - 1) * slotGap) / slotCount);
    var rightX = rankX + rankW + bodyGap;
    var rightW = W - rightX - bodyPadX;
    var cardW = 400, cardH = 540;
    var fromX = rightX + rightW / 2 - cardW / 2;
    var fromY = bodyY + bodyH / 2 - cardH / 2;
    var toX = rankX;
    var toY = bodyY + slotIndex * (slotH + slotGap);
    CanvasRenderer._flyingCard = {
      item: item, startTime: Date.now(), duration: 480,
      fromX: fromX, fromY: fromY, fromW: cardW, fromH: cardH,
      toX: toX, toY: toY, toW: rankW, toH: slotH
    };
  }

  var cardEl = $('mainCard');
  var slotEl = $('rankStrip').children[slotIndex];

  var cardRect = cardEl.getBoundingClientRect();
  var slotRect = slotEl.getBoundingClientRect();

  var fly = document.createElement('div');
  fly.className = 'flying-card';
  fly.style.width = cardRect.width + 'px';
  fly.style.height = cardRect.height + 'px';
  fly.style.left = cardRect.left + 'px';
  fly.style.top = cardRect.top + 'px';

  var imgArea = document.createElement('div');
  imgArea.className = 'flying-card__image-area';

  if (item.image) {
    var img = document.createElement('img');
    img.src = item.image;
    img.alt = item.name;
    imgArea.appendChild(img);
  } else {
    var gradBg = document.createElement('div');
    gradBg.className = 'flying-card__gradient-bg';
    gradBg.style.background = cardGradient(item.name);
    imgArea.appendChild(gradBg);
    var mono = document.createElement('span');
    mono.className = 'flying-card__monogram';
    mono.textContent = item.name.charAt(0).toUpperCase();
    imgArea.appendChild(mono);
  }
  fly.appendChild(imgArea);

  var nameArea = document.createElement('div');
  nameArea.className = 'flying-card__name-area';
  nameArea.textContent = item.name;
  fly.appendChild(nameArea);

  document.body.appendChild(fly);
  cardEl.style.opacity = '0';

  // Trail efekti
  var trail = document.createElement('div');
  trail.className = 'flying-trail';
  trail.style.width = cardRect.width + 'px';
  trail.style.height = cardRect.height + 'px';
  trail.style.left = cardRect.left + 'px';
  trail.style.top = cardRect.top + 'px';
  trail.style.background = cardGradient(item.name);
  document.body.appendChild(trail);

  setTimeout(function() {
    trail.style.left = slotRect.left + 'px';
    trail.style.top = slotRect.top + 'px';
    trail.style.width = slotRect.width + 'px';
    trail.style.height = slotRect.height + 'px';
    trail.style.opacity = '0';
  }, 50);

  setTimeout(function() { trail.remove(); }, 500);

  requestAnimationFrame(function() {
    fly.classList.add('shrink');
    fly.style.width = slotRect.width + 'px';
    fly.style.height = slotRect.height + 'px';
    fly.style.left = slotRect.left + 'px';
    fly.style.top = slotRect.top + 'px';
    fly.style.opacity = '0.6';
  });

  setTimeout(function() {
    fly.remove();
    cardEl.style.opacity = '';
    callback();
  }, 480);
}

/* ================================================================
   KONTROLLER
   ================================================================ */

function resetAll() {
  state.available = items.slice();
  state.slots = new Array(CONFIG.slotCount).fill(null);
  state.currentCard = null;
  state.isShuffling = false;
  state.isRevealed = false;

  showStack(false);
  $('cardStack').classList.remove('revealed');
  $('mainCard').classList.remove('revealed', 'shuffle-enter', 'shuffle-slow', 'shimmer');
  $('videoFrame').classList.remove('shuffling', 'revealed');
  $('selectPrompt').classList.remove('visible');
  hideFinalReveal();

  buildSlots();
  updateCounter();
  setButtonStates();
  clearPanelPlaced();
}

$('btnReset').addEventListener('click', resetAll);

/* Kayit Modu — side panel gizle, video frame tam ekran */
var isRecordMode = false;
$('btnRecord').addEventListener('click', function() {
  isRecordMode = !isRecordMode;
  if (isRecordMode) {
    document.body.classList.add('record-mode');
    document.body.classList.add('hide-cursor');
    this.textContent = 'Duzenle Modu';
  } else {
    document.body.classList.remove('record-mode');
    document.body.classList.remove('hide-cursor');
    this.textContent = 'Kayit Modu';
    if (typeof Recorder !== 'undefined' && Recorder.isRecording) {
      Recorder.stop();
    }
  }
});

/* ESC ile kayit modundan cik */
document.addEventListener('keydown', function(e) {
  if (e.code === 'Escape' && isRecordMode) {
    isRecordMode = false;
    document.body.classList.remove('record-mode');
    document.body.classList.remove('hide-cursor');
    $('btnRecord').textContent = 'Kayit Modu';
    if (typeof Recorder !== 'undefined' && Recorder.isRecording) {
      Recorder.stop();
    }
  }
});

/* Karta / placeholder'a tiklayinca karistir */
$('placeholder').addEventListener('click', startShuffle);
$('shuffleArea').addEventListener('click', function(e) {
  if (state.isShuffling || (state.isRevealed && state.currentCard)) return;
  if (!state.isRevealed && state.available.length > 0) startShuffle();
});

/* Klavye kisayollari — mouse gerekmeden kontrol */
var _keyTimer = null;
var _pendingDigit = null;

document.addEventListener('keydown', function(e) {
  // Input/textarea icindeyse — tum kisayollari engelle (Escape haric)
  var tag = e.target.tagName;
  if ((tag === 'INPUT' || tag === 'TEXTAREA') && e.code !== 'Escape') return;

  // Space: Karistir
  if (e.code === 'Space') {
    e.preventDefault();
    startShuffle();
    return;
  }

  // 1-9, 0(=10): Slot sec — 1 tusuna basinca 500ms bekle, 0 gelirse 10. slot
  if (state.isRevealed && state.currentCard) {
    var isDigit = (e.key >= '0' && e.key <= '9') || e.code === 'Numpad0' || (e.code >= 'Numpad1' && e.code <= 'Numpad9');
    if (!isDigit) { /* diger tuslar */ }
    else {
      e.preventDefault();
      var digit = -1;
      if (e.code === 'Digit0' || e.code === 'Numpad0') digit = 0;
      else if (e.key >= '1' && e.key <= '9') digit = parseInt(e.key);

      if (digit < 0) return;

      // 1'e basilmis ve bekliyor — simdi 0 geldiyse 10. slot
      if (_pendingDigit === 1 && digit === 0) {
        clearTimeout(_keyTimer);
        _keyTimer = null;
        _pendingDigit = null;
        var slot10 = 9;
        if (slot10 < CONFIG.slotCount && !state.slots[slot10]) {
          placeCard(slot10);
        }
        return;
      }

      // Bekleyen baska bir tus varsa once onu isle
      if (_pendingDigit !== null) {
        clearTimeout(_keyTimer);
        var pending = _pendingDigit;
        _keyTimer = null;
        _pendingDigit = null;
        var pSlot = pending - 1;
        if (pSlot >= 0 && pSlot < CONFIG.slotCount && !state.slots[pSlot]) {
          placeCard(pSlot);
        }
      }

      // 0 tusu tek basina = slot 10
      if (digit === 0) {
        var s10 = 9;
        if (s10 < CONFIG.slotCount && !state.slots[s10]) {
          placeCard(s10);
        }
        return;
      }

      // 1 tusuna basildi ve 10+ slot varsa — bekle
      if (digit === 1 && CONFIG.slotCount >= 10) {
        _pendingDigit = 1;
        _keyTimer = setTimeout(function() {
          _pendingDigit = null;
          _keyTimer = null;
          // slot 1
          if (!state.slots[0]) {
            placeCard(0);
          }
        }, 500);
        return;
      }

      // 2-9 direkt isle
      var slotNum = digit - 1;
      if (slotNum >= 0 && slotNum < CONFIG.slotCount && !state.slots[slotNum]) {
        placeCard(slotNum);
      }
    }
  }

  // H: Mouse cursor gizle/goster
  if (e.code === 'KeyH') {
    document.body.classList.toggle('hide-cursor');
  }

  // R: Kayit baslat/durdur
  if (e.code === 'KeyR' && isRecordMode) {
    e.preventDefault();
    if (Recorder.isRecording) {
      Recorder.stop();
    } else {
      if (Recorder.micEnabled && !Recorder.micStream) {
        Recorder.requestMic().then(function() {
          Recorder.start();
        });
      } else {
        Recorder.start();
      }
    }
  }

  // S: Ses efektleri ac/kapa
  if (e.code === 'KeyS') {
    e.preventDefault();
    var on = SFX.toggle();
    $('recSfxToggle').style.opacity = on ? '1' : '0.4';
  }

  // C: Kamera ac/kapa
  if (e.code === 'KeyC') {
    e.preventDefault();
    var camBtn = $('recCamToggle');
    Recorder.toggleCam().then(function(on) {
      camBtn.style.opacity = on ? '1' : '0.5';
    });
  }

  // M: Mikrofon ac/kapa
  if (e.code === 'KeyM') {
    e.preventDefault();
    var micBtn = $('recMicToggle');
    if (!Recorder.micStream && Recorder.micEnabled) {
      Recorder.requestMic().then(function(ok) {
        micBtn.style.opacity = ok ? '1' : '0.4';
      });
    } else {
      var on = Recorder.toggleMic();
      micBtn.style.opacity = on ? '1' : '0.4';
    }
  }
});

/* Textarea auto-resize */
var titleEl = $('topicTitle');
titleEl.addEventListener('input', function() { autoResize(this); });

/* ================================================================
   RENK SECICI
   ================================================================ */

function initColorPicker() {
  var container = $('colorSwatches');
  while (container.firstChild) container.removeChild(container.firstChild);

  TITLE_COLORS.forEach(function(color) {
    var swatch = document.createElement('div');
    swatch.className = 'color-swatch';
    swatch.style.background = color;
    if (color === '#1a1a1a') swatch.classList.add('active');

    swatch.addEventListener('click', function() {
      // Onceki aktifi kaldir
      var prev = container.querySelector('.active');
      if (prev) prev.classList.remove('active');
      swatch.classList.add('active');

      // Baslik rengini degistir
      $('titleWrap').style.background = color;
      document.documentElement.style.setProperty('--header-color', color);

      // Yazı rengini otomatik ayarla (acik renklerde koyu yazi)
      var r = parseInt(color.slice(1, 3), 16);
      var g = parseInt(color.slice(3, 5), 16);
      var b = parseInt(color.slice(5, 7), 16);
      var lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      var textColor = lum > 0.5 ? '#1a1a1a' : '#ffffff';
      $('topicTitle').style.color = textColor;
      $('headerCounter').style.color = lum > 0.5 ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.35)';
    });

    container.appendChild(swatch);
  });
}

/* ================================================================
   BASLANGIC
   ================================================================ */

function init() {
  CONFIG.slotCount = Math.min(items.length, 10);
  titleEl.value = CONFIG.title;
  autoResize(titleEl);
  state.available = items.slice();

  buildSlots();
  updateCounter();
  setButtonStates();
  initPanel();
  initColorPicker();

  // Kayit kontrolleri
  $('recStartStop').addEventListener('click', function(e) {
    e.stopPropagation();
    if (Recorder.isRecording) {
      Recorder.stop();
    } else {
      if (Recorder.micEnabled && !Recorder.micStream) {
        Recorder.requestMic().then(function() {
          Recorder.start();
        });
      } else {
        Recorder.start();
      }
    }
  });

  $('recMicToggle').addEventListener('click', function(e) {
    e.stopPropagation();
    var btn = this;
    if (!Recorder.micStream && Recorder.micEnabled) {
      Recorder.requestMic().then(function(ok) {
        btn.style.opacity = ok ? '1' : '0.4';
      });
    } else {
      var on = Recorder.toggleMic();
      btn.style.opacity = on ? '1' : '0.4';
    }
  });

  $('recSfxToggle').addEventListener('click', function(e) {
    e.stopPropagation();
    var on = SFX.toggle();
    this.style.opacity = on ? '1' : '0.4';
  });

  // Kamera toggle
  $('recCamToggle').addEventListener('click', function(e) {
    e.stopPropagation();
    var btn = this;
    Recorder.toggleCam().then(function(on) {
      btn.style.opacity = on ? '1' : '0.5';
    });
  });

  // Karistirma suresi secici
  $('durationOptions').addEventListener('click', function(e) {
    var btn = e.target.closest('.duration-btn');
    if (!btn) return;
    var prev = this.querySelector('.active');
    if (prev) prev.classList.remove('active');
    btn.classList.add('active');
    CONFIG.shuffleDuration = parseInt(btn.dataset.ms);
  });

  // Intro stili secici
  $('introOptions').addEventListener('click', function(e) {
    var btn = e.target.closest('.duration-btn');
    if (!btn) return;
    var prev = this.querySelector('.active');
    if (prev) prev.classList.remove('active');
    btn.classList.add('active');
    CONFIG.introStyle = btn.dataset.intro;
  });

  // Arka plan secici
  $('bgOptions').addEventListener('click', function(e) {
    var btn = e.target.closest('.duration-btn');
    if (!btn) return;
    var prev = this.querySelector('.active');
    if (prev) prev.classList.remove('active');
    btn.classList.add('active');
    CONFIG.transparentBg = btn.dataset.bg === 'transparent';
    document.body.classList.toggle('transparent-bg', CONFIG.transparentBg);
    $('bgMediaSection').style.display = CONFIG.transparentBg ? '' : 'none';
  });

  // Arka plan medya yukleme
  $('bgMediaUpload').addEventListener('click', function() {
    $('bgMediaInput').click();
  });

  $('bgMediaInput').addEventListener('change', function() {
    var file = this.files[0];
    if (!file) return;
    var layer = $('bgMediaLayer');
    var url = URL.createObjectURL(file);

    // Mevcut icerigi temizle
    while (layer.firstChild) layer.removeChild(layer.firstChild);

    if (file.type.startsWith('video/')) {
      var vid = document.createElement('video');
      vid.src = url;
      vid.autoplay = true;
      vid.loop = true;
      vid.muted = true;
      vid.playsInline = true;
      layer.appendChild(vid);
    } else {
      var img = document.createElement('img');
      img.src = url;
      layer.appendChild(img);
    }
    layer.classList.add('active');
    $('bgMediaRemove').style.display = '';
    this.value = '';
  });

  $('bgMediaRemove').addEventListener('click', function() {
    var layer = $('bgMediaLayer');
    while (layer.firstChild) {
      var child = layer.firstChild;
      if (child.src && child.src.startsWith('blob:')) URL.revokeObjectURL(child.src);
      layer.removeChild(child);
    }
    layer.classList.remove('active');
    this.style.display = 'none';
  });


  // ?record=1 parametresi varsa otomatik kayit moduna gec
  if (new URLSearchParams(window.location.search).get('record') === '1') {
    isRecordMode = true;
    document.body.classList.add('record-mode');
  }
}

init();
</script>
