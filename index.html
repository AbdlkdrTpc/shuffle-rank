<style>
/* ================================================================
   KARISTIR — Acik Premium Tema
   Sol serit siralama + sag kart layout
   ================================================================ */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-page: #edeae5;
  --bg-video: #f8f6f3;
  --bg-card: #ffffff;
  --bg-panel: #f1eeea;
  --bg-slot-empty: rgba(0,0,0,0.025);
  --bg-slot-hover: #f0edfa;
  --border: #e0ddd7;
  --border-light: #eae7e2;
  --border-accent: #c4b5fd;
  --text-primary: #1a1a1a;
  --text-secondary: #6b6560;
  --text-muted: #a8a29e;
  --text-on-card: #ffffff;
  --accent: #7c5cfc;
  --accent-light: #ede9fe;
  --accent-dark: #5b3fd4;
  --title-bg: #1a1a1a;
  --title-color: #ffffff;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  --shadow-card: 0 12px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-card: 16px;
  --font-sans: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --header-color: #1a1a1a;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg-page);
  color: var(--text-primary);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
}

/* ================================================================
   LAYOUT — Sol Panel + 9:16 Video
   ================================================================ */

.layout { display: flex; height: 100vh; height: 100dvh; }

/* ---- Sol Panel ---- */
.side-panel {
  width: 320px;
  min-width: 320px;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.panel-header h2 { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.panel-header p { font-size: 12px; color: var(--text-muted); }

.panel-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius-md);
  padding: 24px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 16px;
  background: rgba(255,255,255,0.5);
}

.upload-zone:hover { border-color: var(--accent); background: var(--accent-light); }
.upload-zone__icon { font-size: 28px; margin-bottom: 8px; display: block; color: var(--text-muted); transition: color 0.2s; }
.upload-zone:hover .upload-zone__icon { color: var(--accent); }
.upload-zone__text { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
.upload-zone__hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.item-list { display: flex; flex-direction: column; gap: 6px; }

.item-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-light);
  transition: all 0.15s;
}

.item-row:hover { border-color: var(--border); box-shadow: var(--shadow-sm); }

.item-row__thumb { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }

.item-row__thumb-placeholder {
  width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--text-on-card);
}

.item-row__name {
  flex: 1; font-size: 13px; font-weight: 500; color: var(--text-primary);
  border: none; background: transparent; outline: none;
  font-family: var(--font-sans); padding: 2px 0; min-width: 0;
}

.item-row__name:focus { border-bottom: 1.5px solid var(--accent); }

.item-row__delete {
  width: 24px; height: 24px; border: none; background: transparent;
  color: var(--text-muted); cursor: pointer; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.15s; flex-shrink: 0;
}

.item-row__delete:hover { background: #fef2f2; color: #ef4444; }

.item-row.placed {
  opacity: 0.4;
  filter: grayscale(1);
  pointer-events: none;
  transition: opacity 0.4s ease, filter 0.4s ease;
}

.panel-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}

.panel-btn {
  flex: 1; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); background: var(--bg-card);
  font-family: var(--font-sans); font-size: 12px; font-weight: 600;
  color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
}

.panel-btn:hover { border-color: var(--accent); color: var(--accent); }

.panel-btn--record {
  background: #dc2626; border-color: #dc2626; color: #fff;
}
.panel-btn--record:hover { background: #b91c1c; border-color: #b91c1c; color: #fff; }
.panel-btn--record::before {
  content: '';
  display: inline-block;
  width: 8px; height: 8px;
  background: #fff;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}

/* Secici section (renk, sure vs.) */
.picker-section {
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border-light);
}

.picker-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

/* Renk secici */
.color-picker-section {
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border-light);
}

.color-picker-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

/* Sure secici */
.duration-options {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.duration-btn {
  padding: 5px 12px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
}

.duration-btn:hover { border-color: var(--text-muted); }

.duration-btn.active {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--accent);
}

.color-swatches {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.color-swatch {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}

.color-swatch:hover { transform: scale(1.1); }

.color-swatch.active {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-light);
}

.color-swatch.active::after {
  content: '';
  position: absolute;
  inset: 4px;
  border: 1.5px solid rgba(255,255,255,0.6);
  border-radius: 4px;
}

.panel-btn--primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.panel-btn--primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); color: #fff; }
.panel-btn--danger { border-color: #fecaca; color: #ef4444; background: #fef2f2; }
.panel-btn--danger:hover { border-color: #ef4444; background: #fee2e2; color: #dc2626; }

/* ================================================================
   VIDEO FRAME — 9:16
   ================================================================ */

.video-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.video-frame {
  width: 100%;
  max-width: 400px;
  aspect-ratio: 9 / 16;
  max-height: calc(100dvh - 32px);
  background: var(--bg-video);
  border-radius: 0;
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  border: 2px solid color-mix(in srgb, var(--header-color) 20%, var(--border));
}

/* ---- Konu Basligi ---- */
.v-header {
  position: relative;
  z-index: 2;
  padding: 14px 14px 10px;
  flex-shrink: 0;
}

.v-header__title-wrap {
  background: var(--title-bg);
  border-radius: var(--radius-lg);
  padding: 16px 20px 14px;
  position: relative;
}

.v-header__counter {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.35);
  letter-spacing: 1px;
  margin-bottom: 6px;
  border: none;
  background: transparent;
  outline: none;
  padding: 0;
  width: 80px;
  cursor: text;
}

.v-header__counter:focus {
  color: rgba(255,255,255,0.6);
}

.v-header__title {
  font-size: 22px;
  font-weight: 700;
  color: var(--title-color);
  border: none;
  background: transparent;
  width: 100%;
  font-family: var(--font-sans);
  outline: none;
  resize: none;
  line-height: 1.25;
  overflow: hidden;
}

.v-header__title::placeholder { color: rgba(255,255,255,0.25); }

/* ---- Ana Govde: Sol serit + Sag alan ---- */
.v-body {
  flex: 1;
  display: flex;
  min-height: 0;
  padding: 0 12px 12px;
  gap: 10px;
  position: relative;
  z-index: 2;
}

/* ---- Sol Siralama Seridi ---- */
.rank-strip {
  width: 140px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.rank-slot {
  flex: 1;
  min-height: 0;
  border-radius: 10px;
  border: 1.5px dashed var(--border);
  background: var(--bg-slot-empty);
  display: grid;
  grid-template-columns: 20px 42px 1fr;
  align-items: center;
  gap: 5px;
  padding: 0 6px;
  cursor: default;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}

.rank-slot__number {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  transition: all 0.2s;
  line-height: 1;
  text-align: center;
}

.rank-slot__thumb {
  width: 38px;
  height: 38px;
  border-radius: 7px;
  overflow: hidden;
  display: none;
  flex-shrink: 0;
}

.rank-slot__thumb img {
  width: 100%; height: 100%; object-fit: cover;
}

.rank-slot__thumb-gradient {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.9);
}

.rank-slot__name {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.2;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  display: none;
}

/* Slot durumlari */
.rank-slot.selectable {
  cursor: pointer;
  border-color: var(--border);
  background: var(--bg-slot-empty);
}

.rank-slot.selectable:hover {
  background: rgba(0,0,0,0.05);
  border-color: var(--text-muted);
  transform: scale(1.05);
  box-shadow: var(--shadow-sm);
}

.rank-slot.selectable .rank-slot__number { color: var(--text-muted); }

.rank-slot.filled {
  border-style: solid;
  border-color: var(--border);
  background: var(--bg-card);
  box-shadow: var(--shadow-sm);
}

.rank-slot.filled .rank-slot__number {
  font-size: 9px;
  color: var(--text-muted);
}

.rank-slot.filled .rank-slot__thumb { display: block; }
.rank-slot.filled .rank-slot__name { display: block; }

.rank-slot.just-placed {
  animation: slotBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes slotBounce {
  0% { transform: scale(0.9); }
  50% { transform: scale(1.06); }
  100% { transform: scale(1); }
}

/* ---- Sag Alan (Shuffle + Butonlar) ---- */
.right-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 0;
  gap: 8px;
}


/* Shuffle Area */
.shuffle-area {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  width: 100%;
  min-height: 180px;
}

.card-stack {
  position: relative;
  width: 150px;
  height: 200px;
  perspective: 900px;
}

/* ---- Kart ---- */
.card {
  position: absolute;
  inset: 0;
  border-radius: var(--radius-card);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  backface-visibility: hidden;
  will-change: transform, opacity, filter;
  transition: transform 0.07s linear, opacity 0.07s linear;
  box-shadow: var(--shadow-card);
  background: var(--bg-card);
}

.card__image-area {
  width: 100%; flex: 1;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}

.card__image { width: 100%; height: 100%; object-fit: cover; }
.card__gradient-bg { position: absolute; inset: 0; }

.card__monogram {
  font-size: 56px; font-weight: 700;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 2px 12px rgba(0,0,0,0.15);
  line-height: 1; position: relative; z-index: 1;
}

.card__name-area {
  width: 100%; padding: 10px 12px; text-align: center;
  background: var(--bg-card); border-top: 1px solid var(--border-light);
  flex-shrink: 0;
}

.card__name {
  font-size: 13px; font-weight: 700;
  color: var(--text-primary); letter-spacing: 0.2px;
}

/* Golge kartlar */
.card-shadow {
  position: absolute; inset: 0;
  border-radius: var(--radius-card);
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow-sm);
  pointer-events: none;
}

.card-shadow:nth-child(1) { transform: translateY(5px) scale(0.96) rotate(-1deg); opacity: 0.5; }
.card-shadow:nth-child(2) { transform: translateY(10px) scale(0.92) rotate(1.2deg); opacity: 0.25; }
.card-shadow:nth-child(3) { transform: translateY(15px) scale(0.88) rotate(-0.5deg); opacity: 0.1; }

/* Kart arkasi */
.card-back {
  position: absolute;
  inset: 0;
  border-radius: var(--radius-card);
  background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: -1;
  pointer-events: none;
}

.card-back__pattern {
  width: 60%;
  height: 60%;
  opacity: 0.08;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 10px,
    rgba(255,255,255,1) 10px,
    rgba(255,255,255,1) 11px
  );
  border-radius: 8px;
}

.card-back__logo {
  position: absolute;
  font-size: 28px;
  font-weight: 800;
  color: rgba(255,255,255,0.15);
  font-family: var(--font-mono);
  letter-spacing: 3px;
}

/* Shimmer efekti */
.card.shimmer::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius-card);
  background: linear-gradient(
    105deg,
    transparent 40%,
    rgba(255,255,255,0.4) 50%,
    transparent 60%
  );
  animation: shimmerPass 0.8s ease-out forwards;
  pointer-events: none;
  z-index: 10;
}

@keyframes shimmerPass {
  0% { transform: translateX(-100%); opacity: 1; }
  100% { transform: translateX(100%); opacity: 0; }
}

/* Flying card trail */
.flying-trail {
  position: fixed;
  border-radius: var(--radius-card);
  pointer-events: none;
  z-index: 199;
  opacity: 0.3;
  filter: blur(4px);
  transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

/* Confetti */
.confetti-piece {
  position: fixed;
  width: 8px;
  height: 8px;
  pointer-events: none;
  z-index: 300;
  animation: confettiFall var(--fall-duration) ease-in forwards;
}

@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(var(--fall-y)) rotate(var(--fall-rot)); opacity: 0; }
}

/* Slot wave (tamamlanma) */
.rank-slot.wave-glow {
  animation: slotWaveGlow 0.5s ease-out forwards;
}

@keyframes slotWaveGlow {
  0% { box-shadow: var(--shadow-sm); }
  50% { box-shadow: 0 0 12px color-mix(in srgb, var(--header-color) 30%, transparent), var(--shadow-sm); }
  100% { box-shadow: var(--shadow-sm); }
}

/* Shuffle animasyonlar */
.card.shuffle-enter { animation: shuffleIn 0.06s ease-out forwards; }

@keyframes shuffleIn {
  from { transform: translateY(-28px) rotate(calc(var(--rot) * 1deg)) scale(0.93); opacity: 0.3; filter: blur(1.5px); }
  to { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; filter: blur(0); }
}

.card.shuffle-slow { animation: shuffleInSlow 0.14s ease-out forwards; }

@keyframes shuffleInSlow {
  from { transform: translateY(-18px) rotate(calc(var(--rot) * 1deg)) scale(0.97); opacity: 0.5; filter: blur(0.5px); }
  to { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; filter: blur(0); }
}

.card.revealed { animation: cardReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

@keyframes cardReveal {
  0% { transform: scale(0.85) rotate(-2deg); opacity: 0.5; }
  40% { transform: scale(1.12) rotate(0.5deg); opacity: 1; }
  65% { transform: scale(0.97) rotate(-0.3deg); }
  85% { transform: scale(1.04) rotate(0deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

.card-stack.revealed .card {
  box-shadow: var(--shadow-card), 0 0 0 4px color-mix(in srgb, var(--header-color) 15%, white), 0 0 50px color-mix(in srgb, var(--header-color) 30%, transparent), 0 0 80px color-mix(in srgb, var(--header-color) 10%, transparent);
  animation: revealPulse 2s ease-in-out infinite;
}

.card-stack.revealed::before {
  content: '';
  position: absolute;
  inset: -20px;
  border-radius: 24px;
  background: radial-gradient(ellipse at center, color-mix(in srgb, var(--header-color) 30%, transparent) 0%, transparent 70%);
  animation: revealGlow 0.8s ease-out forwards;
  pointer-events: none;
  z-index: 0;
}

@keyframes revealGlow {
  0% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0.6; transform: scale(1); }
}

@keyframes revealPulse {
  0%, 100% { box-shadow: var(--shadow-card), 0 0 0 4px color-mix(in srgb, var(--header-color) 15%, white), 0 0 40px color-mix(in srgb, var(--header-color) 20%, transparent), 0 0 80px color-mix(in srgb, var(--header-color) 5%, transparent); }
  50% { box-shadow: var(--shadow-card), 0 0 0 5px color-mix(in srgb, var(--header-color) 15%, white), 0 0 55px color-mix(in srgb, var(--header-color) 35%, transparent), 0 0 100px color-mix(in srgb, var(--header-color) 10%, transparent); }
}

/* Placeholder — tiklanabilir */
.shuffle-placeholder {
  width: 150px; height: 200px;
  border-radius: var(--radius-card);
  border: 2px dashed var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 9px; font-weight: 500;
  color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s;
}

.shuffle-placeholder:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
  transform: scale(1.02);
}

/* Card stack tiklanabilir */
.card-stack { cursor: pointer; }
.card-stack:not(.revealed):hover .card { transform: scale(1.02); }

/* Mouse gizleme modu */
.hide-cursor, .hide-cursor * { cursor: none !important; }

/* Kayit Modu — Tam Ekran 9:16 */
.record-mode .side-panel {
  display: none !important;
}

/* Arka plan medya secici */
.bg-media-picker {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.bg-media-upload {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;

  height: 100px;

}

/* Transparent mod — checkerboard + kesikli cizgi (sadece ekranda, kayitta yok) */

.record-mode .v-header__title { font-size: 26px; height: auto !important; }
.record-mode .v-header__counter { font-size: 13px; }

/* Select prompt — pulsing arrow */
.select-prompt {
  opacity: 0;
  transition: opacity 0.3s ease;
  display: flex;
  align-items: center;
  gap: 6px;
}

.select-prompt.visible { opacity: 1; }

.select-prompt__arrow {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent-light);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: pulseArrow 1.2s ease-in-out infinite;
}

.select-prompt__arrow::before {
  content: '';
  width: 6px;
  height: 6px;
  border-left: 2px solid var(--accent);
  border-bottom: 2px solid var(--accent);
  transform: rotate(45deg) translate(1px, -1px);
}

@keyframes pulseArrow {
  0%, 100% { transform: translateX(0); opacity: 0.6; }
  50% { transform: translateX(-4px); opacity: 1; }
}

/* (Butonlar video disinda — sol panelde) */

/* Final reveal — liste on plana */
.v-body.final-reveal .right-area {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

.v-body.final-reveal .rank-strip {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 85%;
  gap: 5px;
  z-index: 10;
  transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}

.v-body.final-reveal .rank-slot {
  grid-template-columns: 28px 48px 1fr;
  gap: 8px;
  padding: 2px 10px;
  border-radius: 12px;
}

.v-body.final-reveal .rank-slot__number { font-size: 14px; }

.v-body.final-reveal .rank-slot__name { font-size: 12px; }

.rank-slot.final-glow {

}

@keyframes finalSlotGlow {

  50% { transform: scale(1.03); box-shadow: 0 0 16px color-mix(in srgb, var(--header-color) 25%, transparent); }

.record-mode .v-body.final-reveal .rank-slot {

.video-frame::after {
  content: ''; position: absolute; top: 35%; left: 55%;

.video-frame.shuffling::after { opacity: 1; animation: ambientPulse 1s ease-in-out infinite; }
.video-frame.revealed::after { opacity: 0.8; animation: none; }

@keyframes ambientPulse {
  0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }

/* ================================================================
   AYARLAR

var CONFIG = {
  title: "En Iyi Film Karakterleri",
  shuffleDuration: 2800,
  shuffleSpeed: 65,
  slowdownAt: 0.55,

  introDuration: 4000,
  transparentBg: false,
};

/* ================================================================
   SES EFEKTLERI — Web Audio API
   ================================================================ */

var SFX = {
  ctx: null,
  enabled: true,
  masterGain: null,
  destination: null,

  init: function() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.5;
    this.destination = this.ctx.createMediaStreamDestination();
    this.masterGain.connect(this.ctx.destination);
    this.masterGain.connect(this.destination);
  },

  ensureCtx: function() {
    if (!this.ctx) this.init();
    if (this.ctx.state === 'suspended') this.ctx.resume();
  },

  toggle: function() {
    this.enabled = !this.enabled;
    return this.enabled;
  },

  whoosh: function() {
    if (!this.enabled) return;
    this.ensureCtx();
    var ctx = this.ctx;
    var now = ctx.currentTime;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    var filter = ctx.createBiquadFilter();

    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(80, now + 0.25);

    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(2000, now);
    filter.frequency.exponentialRampToValueAtTime(200, now + 0.25);

    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(this.masterGain);

    osc.start(now);
    osc.stop(now + 0.3);
  },

  tick: function() {
    if (!this.enabled) return;
    this.ensureCtx();
    var ctx = this.ctx;
    var now = ctx.currentTime;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, now);

    gain.gain.setValueAtTime(0.06, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);

    osc.connect(gain);
    gain.connect(this.masterGain);

    osc.start(now);
    osc.stop(now + 0.04);
  },

  ding: function() {
    if (!this.enabled) return;
    this.ensureCtx();
    var ctx = this.ctx;
    var now = ctx.currentTime;
    var osc = ctx.createOscillator();
    var osc2 = ctx.createOscillator();
    var gain = ctx.createGain();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, now);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(1320, now);

    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);

    osc.connect(gain);
    osc2.connect(gain);
    gain.connect(this.masterGain);

    osc.start(now);
    osc2.start(now + 0.05);
    osc.stop(now + 0.6);
    osc2.stop(now + 0.6);
  },

  pop: function() {
    if (!this.enabled) return;
    this.ensureCtx();
    var ctx = this.ctx;
    var now = ctx.currentTime;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, now);
    osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);

    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);

    osc.connect(gain);
    gain.connect(this.masterGain);

    osc.start(now);
    osc.stop(now + 0.15);
  },

  complete: function() {
    if (!this.enabled) return;
    this.ensureCtx();
    var ctx = this.ctx;
    var now = ctx.currentTime;
    var notes = [523, 659, 784];

    notes.forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      var t = now + i * 0.15;

      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t);

      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.2, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);

      osc.connect(gain);
      gain.connect(SFX.masterGain);

      osc.start(t);
      osc.stop(t + 0.4);
    });
  }
};

/* ================================================================
   INTRO RENDERER — Kayit oncesi acilis animasyonu
   ================================================================ */

var IntroRenderer = {
  isPlaying: false,
  startTime: 0,
  _callback: null,
  // Parcaciklar (dynamic stil icin)
  _particles: [],

  // Easing fonksiyonlari
  easeOutBack: function(t) {
    var c1 = 1.70158;
    var c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeOutCubic: function(t) { return 1 - Math.pow(1 - t, 3); },
  easeInQuad: function(t) { return t * t; },
  easeInOutCubic: function(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; },

  clamp: function(v, min, max) { return v < min ? min : v > max ? max : v; },
  progress: function(elapsed, start, dur) {
    return this.clamp((elapsed - start) / dur, 0, 1);
  },

  start: function(callback) {
    this.isPlaying = true;
    this.startTime = Date.now();
    this._callback = callback;
    // Parcaciklar olustur (dynamic icin)
    this._particles = [];
    for (var i = 0; i < 20; i++) {
      this._particles.push({
        x: Math.random(),
        y: Math.random(),
        size: 3 + Math.random() * 6,
        speed: 0.3 + Math.random() * 0.7,
        angle: Math.random() * Math.PI * 2,
        color: ['#ffd60a', '#00f5d4', '#ff6b9d', '#ffffff', '#a78bfa'][Math.floor(Math.random() * 5)],
        shape: Math.random() > 0.5 ? 'circle' : 'rect'
      });
    }
  },

  drawFrame: function(ctx) {
    var elapsed = Date.now() - this.startTime;
    var duration = CONFIG.introDuration;

    if (elapsed >= duration) {
      this.isPlaying = false;
      if (this._callback) this._callback();
      return;
    }

    if (CONFIG.introStyle === 'dynamic') {
      this._drawDynamic(ctx, elapsed, duration);
    } else {
      this._drawMinimal(ctx, elapsed, duration);
    }
  },

  _drawDynamic: function(ctx, elapsed, duration) {
    var W = 1080, H = 1920;
    var headerColor = CanvasRenderer.getHeaderColor();
    var titleText = $('topicTitle').value || CONFIG.title;

    // ── Arka plan: header rengi bazli gradient ──
    if (CONFIG.transparentBg) {
      ctx.clearRect(0, 0, W, H);
      // Arka plan medyasi varsa ciz
      var bgLayer = $('bgMediaLayer');
      if (bgLayer && bgLayer.classList.contains('active')) {
        var bgEl = bgLayer.querySelector('img, video');
        if (bgEl && (bgEl.tagName === 'IMG' ? bgEl.complete : bgEl.readyState >= 2)) {
          try { CanvasRenderer.drawImageCover(ctx, bgEl, 0, 0, W, H); } catch(e) {}
        }
      }
    } else {
      // Koyu gradient — header renginden turetilmis
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);
      // Header rengiyle hafif radial glow
      var glow = ctx.createRadialGradient(W/2, H*0.42, 0, W/2, H*0.42, W*0.7);
      glow.addColorStop(0, headerColor + '40');
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, H);
    }

    // ── Zoom gecis (son 500ms) ──
    var zoomP = this.progress(elapsed, duration - 500, 500);
    if (zoomP > 0) {
      var zoomScale = 1 + this.easeInQuad(zoomP) * 0.4;
      var zoomAlpha = 1 - this.easeInQuad(zoomP);
      ctx.save();
      ctx.globalAlpha = zoomAlpha;
      ctx.translate(W/2, H/2);
      ctx.scale(zoomScale, zoomScale);
      ctx.translate(-W/2, -H/2);
    }

    // ── Ust dekoratif cizgi (0-0.8s) ──
    var topLineP = this.progress(elapsed, 0, 800);
    if (topLineP > 0) {
      var tlW = 60 * this.easeOutCubic(topLineP);
      ctx.save();
      ctx.globalAlpha = 0.4 * this.easeOutCubic(topLineP);
      ctx.fillStyle = headerColor;
      CanvasRenderer.roundRect(ctx, W/2 - tlW/2, H*0.30, tlW, 4, 2);
      ctx.fill();
      ctx.restore();
    }

    // ── "TOP N" badge (0.2-1s) ──
    var badgeP = this.progress(elapsed, 200, 600);
    if (badgeP > 0) {
      var badgeScale = this.easeOutBack(badgeP);
      var badgeAlpha = this.easeOutCubic(badgeP);
      var topText = 'TOP ' + CONFIG.slotCount;

      ctx.save();
      ctx.globalAlpha = badgeAlpha;
      ctx.translate(W/2, H * 0.34);
      ctx.scale(badgeScale, badgeScale);

      // Badge arka plan
      ctx.font = '800 32px "JetBrains Mono", monospace';
      var badgeW = ctx.measureText(topText).width + 48;
      var badgeH = 52;
      ctx.fillStyle = headerColor;
      ctx.shadowColor = headerColor + '60';
      ctx.shadowBlur = 20;
      CanvasRenderer.roundRect(ctx, -badgeW/2, -badgeH/2, badgeW, badgeH, badgeH/2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Badge metin
      var colors = CanvasRenderer.textColorForBg(headerColor);
      ctx.fillStyle = colors.text;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(topText, 0, 1);
      ctx.restore();
    }

    // ── Ana baslik — HOOK (0.6-1.8s) ──
    var titleP = this.progress(elapsed, 600, 800);
    if (titleP > 0) {
      var titleScale = 1.15 - 0.15 * this.easeOutCubic(titleP);
      var titleAlpha = this.easeOutCubic(titleP);
      var titleY = H * 0.42 + 30 * (1 - this.easeOutCubic(titleP));

      ctx.save();
      ctx.globalAlpha = titleAlpha;
      ctx.translate(W/2, titleY);
      ctx.scale(titleScale, titleScale);
      ctx.font = '800 72px "DM Sans", sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.shadowColor = 'rgba(0,0,0,0.4)';
      ctx.shadowBlur = 24;

      var lines = CanvasRenderer.wrapText(ctx, titleText, W * 0.78);
      var lineH = 88;
      var totalTextH = lines.length * lineH;
      for (var li = 0; li < lines.length; li++) {
        ctx.fillText(lines[li], 0, li * lineH - totalTextH/2);
      }
      ctx.restore();
    }

    // ── Alt cizgi separator (1.5-2.2s) ──
    var sepP = this.progress(elapsed, 1500, 500);
    if (sepP > 0) {
      var sepW = 100 * this.easeOutCubic(sepP);
      ctx.save();
      ctx.globalAlpha = 0.6 * this.easeOutCubic(sepP);
      ctx.fillStyle = headerColor;
      ctx.shadowColor = headerColor + '80';
      ctx.shadowBlur = 12;
      CanvasRenderer.roundRect(ctx, W/2 - sepW/2, H*0.56, sepW, 5, 2.5);
      ctx.fill();
      ctx.restore();
    }

    // ── Parlayan parcaciklar (1s'den itibaren) ──
    var partAlpha = this.clamp((elapsed - 1000) / 800, 0, 1) * (1 - zoomP);
    if (partAlpha > 0) {
      var t = elapsed / 1000;
      for (var i = 0; i < this._particles.length; i++) {
        var p = this._particles[i];
        var px = (p.x + Math.sin(t * p.speed + p.angle) * 0.05) * W;
        var py = (p.y + Math.cos(t * p.speed * 0.6 + p.angle) * 0.06) * H;
        var pA = (0.15 + Math.sin(t * p.speed * 2.5) * 0.15) * partAlpha;

        ctx.save();
        ctx.globalAlpha = pA;
        ctx.fillStyle = p.color;
        if (p.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(px, py, p.size * 1.5, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.translate(px, py);
          ctx.rotate(t * p.speed);
          ctx.fillRect(-p.size, -p.size, p.size * 2, p.size * 2);
        }
        ctx.restore();
      }
    }

    // ── Soru isareti / emoji dekor (2-3s) ──
    var dekorP = this.progress(elapsed, 2000, 600);
    if (dekorP > 0 && dekorP < 1) {
      var dAlpha = dekorP < 0.5 ? dekorP * 2 : (1 - dekorP) * 2;
      ctx.save();
      ctx.globalAlpha = dAlpha * 0.12;
      ctx.font = '900 320px "DM Sans", sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('?', W/2, H * 0.47);
      ctx.restore();
    }

    if (zoomP > 0) {
      ctx.restore();
    }
  },

  _drawMinimal: function(ctx, elapsed, duration) {
    var W = 1080, H = 1920;
    var headerColor = CanvasRenderer.getHeaderColor();
    var titleText = $('topicTitle').value || CONFIG.title;

    // ── Arka plan ──
    if (CONFIG.transparentBg) {
      ctx.clearRect(0, 0, W, H);
      var bgLayer = $('bgMediaLayer');
      if (bgLayer && bgLayer.classList.contains('active')) {
        var bgEl = bgLayer.querySelector('img, video');
        if (bgEl && (bgEl.tagName === 'IMG' ? bgEl.complete : bgEl.readyState >= 2)) {
          try { CanvasRenderer.drawImageCover(ctx, bgEl, 0, 0, W, H); } catch(e) {}
        }
      }
    } else {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);
    }

    // ── Zoom gecis (son 500ms) ──
    var zoomP = this.progress(elapsed, duration - 500, 500);
    if (zoomP > 0) {
      var zoomScale = 1 + this.easeInQuad(zoomP) * 0.3;
      var zoomAlpha = 1 - this.easeInQuad(zoomP);
      ctx.save();
      ctx.globalAlpha = zoomAlpha;
      ctx.translate(W/2, H/2);
      ctx.scale(zoomScale, zoomScale);
      ctx.translate(-W/2, -H/2);
    }

    // ── Ust ince cizgi (0-0.8s) ──
    var topLineP = this.progress(elapsed, 0, 800);
    if (topLineP > 0) {
      var tlH = 50 * this.easeOutCubic(topLineP);
      ctx.save();
      ctx.globalAlpha = 0.15 * this.easeOutCubic(topLineP);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(W/2 - 0.5, H * 0.30 - tlH, 1, tlH);
      ctx.restore();
    }

    // ── "TOP N" (0.3-1.2s) ──
    var numP = this.progress(elapsed, 300, 600);
    if (numP > 0) {
      var topText = 'TOP ' + CONFIG.slotCount;
      ctx.save();
      ctx.globalAlpha = this.easeOutCubic(numP);
      ctx.font = '500 28px "JetBrains Mono", monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(topText, W/2, H * 0.36);
      ctx.restore();
    }

    // ── Konu basligi (0.8-2s) ──
    var titleP = this.progress(elapsed, 800, 700);
    if (titleP > 0) {
      ctx.save();
      ctx.globalAlpha = this.easeOutCubic(titleP);
      ctx.translate(W/2, H * 0.44);
      ctx.font = '700 60px "DM Sans", sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      var lines = CanvasRenderer.wrapText(ctx, titleText, W * 0.72);
      var lineH = 76;
      var totalH = lines.length * lineH;
      for (var li = 0; li < lines.length; li++) {
        ctx.fillText(lines[li], 0, li * lineH - totalH/2);
      }
      ctx.restore();
    }

    // ── Accent cizgi (1.5-2.2s) ──
    var accP = this.progress(elapsed, 1500, 500);
    if (accP > 0) {
      var accW = 60 * this.easeOutCubic(accP);
      ctx.save();
      ctx.globalAlpha = 0.35 * this.easeOutCubic(accP);
      ctx.fillStyle = headerColor;
      CanvasRenderer.roundRect(ctx, W/2 - accW/2, H*0.54, accW, 3, 1.5);
      ctx.fill();
      ctx.restore();
    }

    if (zoomP > 0) {
      ctx.restore();
    }
  }
};

/* ================================================================
   CANVAS RENDERER — Dogrudan canvas'a cizim (getDisplayMedia yerine)
   ================================================================ */

var CanvasRenderer = {
  imageCache: {},
  _displayItem: null,
  _flyingCard: null, // { item, startTime, duration, fromX, fromY, fromW, fromH, toX, toY, toW, toH }

  preloadImages: function(callback) {
    var self = this;
    var toLoad = 0;
    var loaded = 0;

    items.forEach(function(item) {
      if (item.image && !self.imageCache[item.image]) {
        toLoad++;
        var img = new Image();
        img.onload = function() {
          self.imageCache[item.image] = img;
          loaded++;
          if (loaded === toLoad && callback) callback();
        };
        img.onerror = function() {
          loaded++;
          if (loaded === toLoad && callback) callback();
        };
        img.src = item.image;
      }
    });

    if (toLoad === 0 && callback) callback();
  },

  roundRect: function(ctx, x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  },

  drawImageCover: function(ctx, img, x, y, w, h) {
    var nw = img.naturalWidth || img.videoWidth || img.width;
    var nh = img.naturalHeight || img.videoHeight || img.height;
    if (!nw || !nh) return;
    var imgR = nw / nh;
    var areaR = w / h;
    var sx, sy, sw, sh;
    if (imgR > areaR) {
      sh = nh;
      sw = sh * areaR;
      sx = (nw - sw) / 2;
      sy = 0;
    } else {
      sw = nw;
      sh = sw / areaR;
      sx = 0;
      sy = (nh - sh) / 2;
    }
    ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
  },

  wrapText: function(ctx, text, maxW) {
    var words = text.split(' ');
    var lines = [];
    var line = words[0] || '';
    for (var i = 1; i < words.length; i++) {
      var test = line + ' ' + words[i];
      if (ctx.measureText(test).width > maxW) {
        lines.push(line);
        line = words[i];
      } else {
        line = test;
      }
    }
    lines.push(line);
    return lines;
  },

  getHeaderColor: function() {
    var style = $('titleWrap').style.background;
    if (style && style.charAt(0) === '#') return style;
    var computed = getComputedStyle($('titleWrap')).backgroundColor;
    if (computed && computed.indexOf('rgb') === 0) {
      var parts = computed.match(/\d+/g);
      if (parts && parts.length >= 3) {
        return '#' + ((1 << 24) + (parseInt(parts[0]) << 16) + (parseInt(parts[1]) << 8) + parseInt(parts[2])).toString(16).slice(1);
      }
    }
    return '#1a1a1a';
  },

  textColorForBg: function(hex) {
    hex = hex.replace('#', '');
    if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    var r = parseInt(hex.slice(0,2), 16);
    var g = parseInt(hex.slice(2,4), 16);
    var b = parseInt(hex.slice(4,6), 16);
    var lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    return {
      text: lum > 0.5 ? '#1a1a1a' : '#ffffff',
      counter: lum > 0.5 ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.35)'
    };
  },

  drawFrame: function(ctx) {
    var W = 1080, H = 1920;
    var isFinalReveal = document.querySelector('.v-body').classList.contains('final-reveal');

    // ── Background ──
    if (CONFIG.transparentBg) {
      ctx.clearRect(0, 0, W, H);
      // Arka plan medyasi varsa canvas'a ciz
      var bgLayer = $('bgMediaLayer');
      if (bgLayer && bgLayer.classList.contains('active')) {
        var bgEl = bgLayer.querySelector('img, video');
        if (bgEl && (bgEl.tagName === 'IMG' ? bgEl.complete : bgEl.readyState >= 2)) {
          try { this.drawImageCover(ctx, bgEl, 0, 0, W, H); } catch(e) {}
        }
      }
    } else {
      ctx.fillStyle = '#f8f6f3';
      ctx.fillRect(0, 0, W, H);
    }

    // ── Header ──
    var hPadX = 28, hPadTop = 28, hPadBot = 20;
    var headerColor = this.getHeaderColor();
    var colors = this.textColorForBg(headerColor);

    var twX = hPadX, twY = hPadTop;
    var twW = W - 2 * hPadX;
    var twPadX = 44, twPadTop = 36, twPadBot = 32;
    var twRadius = 40;
    var counterText = $('headerCounter').value || '';
    var titleText = $('topicTitle').value || '';
    var counterSize = 26;
    var titleSize = 52;
    var titleLH = 64;

    ctx.font = '700 ' + titleSize + 'px "DM Sans", sans-serif';
    var titleLines = this.wrapText(ctx, titleText, twW - 2 * twPadX);
    var counterH = counterText ? counterSize + 10 : 0;
    var titleH = titleLines.length * titleLH;
    var twH = twPadTop + counterH + titleH + twPadBot;

    ctx.fillStyle = headerColor;
    this.roundRect(ctx, twX, twY, twW, twH, twRadius);
    ctx.fill();

    if (counterText) {
      ctx.font = '600 ' + counterSize + 'px "JetBrains Mono", monospace';
      ctx.fillStyle = colors.counter;
      ctx.textBaseline = 'top';
      ctx.textAlign = 'left';
      ctx.fillText(counterText, twX + twPadX, twY + twPadTop);
    }

    ctx.font = '700 ' + titleSize + 'px "DM Sans", sans-serif';
    ctx.fillStyle = colors.text;
    ctx.textBaseline = 'top';
    var titleY = twY + twPadTop + counterH;
    for (var ti = 0; ti < titleLines.length; ti++) {
      ctx.fillText(titleLines[ti], twX + twPadX, titleY + ti * titleLH);
    }

    var headerBottom = twY + twH + hPadBot;

    // ── Body ──
    var bodyPadX = 24, bodyPadBot = 24, bodyGap = 20;
    var bodyY = headerBottom;
    var bodyH = H - bodyY - bodyPadBot;
    var slotCount = CONFIG.slotCount;
    var slotGap = 8;

    if (isFinalReveal) {
      var frRankW = Math.round(W * 0.85);
      var frX = Math.round((W - frRankW) / 2);
      var frSlotGap = 14;
      // Slot yuksekligi content'e gore — HTML'deki gibi
      var frSlotH = 140;
      var totalGroupH = slotCount * frSlotH + (slotCount - 1) * frSlotGap;
      // Dikeyde ortala
      var frStartY = bodyY + Math.round((bodyH - totalGroupH) / 2);

      for (var si = 0; si < slotCount; si++) {
        var sY = frStartY + si * (frSlotH + frSlotGap);
        this._drawSlot(ctx, frX, sY, frRankW, frSlotH, si, state.slots[si], true);
      }
    } else {
      var rankW = 360;
      var rankX = bodyPadX;
      var totalGaps = (slotCount - 1) * slotGap;
      var slotH = Math.floor((bodyH - totalGaps) / slotCount);

      for (var si = 0; si < slotCount; si++) {
        var sY = bodyY + si * (slotH + slotGap);
        this._drawSlot(ctx, rankX, sY, rankW, slotH, si, state.slots[si], false);
      }

      var rightX = rankX + rankW + bodyGap;
      var rightW = W - rightX - bodyPadX;
      var defaultCX = rightX + rightW / 2;
      var defaultCY = bodyY + bodyH / 2;

      this._drawShuffleArea(ctx, defaultCX, defaultCY);
    }

    // ── Flying Card animasyonu ──
    if (this._flyingCard) {
      this._drawFlyingCard(ctx);
    }

    // ── Kamera PiP (her zaman en üstte) ──
    this._drawCameraPip(ctx, W, H);
  },

  _drawSlot: function(ctx, x, y, w, h, index, item, isFinal) {
    var filled = !!item;
    var radius = isFinal ? 28 : 24;

    if (filled) {
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.06)';
      ctx.shadowBlur = 6;
      ctx.shadowOffsetY = 2;
      ctx.fillStyle = '#ffffff';
      this.roundRect(ctx, x, y, w, h, radius);
      ctx.fill();
      ctx.restore();
      ctx.strokeStyle = '#e0ddd7';
      ctx.lineWidth = 2;
      this.roundRect(ctx, x, y, w, h, radius);
      ctx.stroke();
    } else {
      ctx.fillStyle = 'rgba(0,0,0,0.025)';
      this.roundRect(ctx, x, y, w, h, radius);
      ctx.fill();
      ctx.setLineDash([8, 5]);
      ctx.strokeStyle = '#e0ddd7';
      ctx.lineWidth = 2.5;
      this.roundRect(ctx, x, y, w, h, radius);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    var padX = isFinal ? 28 : 20;
    var gap = isFinal ? 12 : 8;
    var cy = y + h / 2;

    // Numara — sol tarafta, dikeyde ortali
    var numSize = filled ? (isFinal ? 36 : 20) : (isFinal ? 36 : 32);
    var numW = isFinal ? 64 : 56;
    ctx.font = '700 ' + numSize + 'px "JetBrains Mono", monospace';
    ctx.fillStyle = '#a8a29e';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'center';
    ctx.fillText(String(index + 1), x + padX + numW / 2, cy);
    ctx.textAlign = 'left';

    if (filled) {
      // Yatay layout: numara | gorsel | isim
      var contentX = x + padX + numW + gap;
      var contentW = w - padX - numW - gap - padX;
      var thumbPad = isFinal ? 10 : 6;
      var thumbSize = h - 2 * thumbPad;
      var thumbX = contentX;
      var thumbY = y + thumbPad;
      var thumbR = isFinal ? 16 : 12;

      var cachedImg = item.image ? this.imageCache[item.image] : null;
      if (cachedImg) {
        ctx.save();
        this.roundRect(ctx, thumbX, thumbY, thumbSize, thumbSize, thumbR);
        ctx.clip();
        this.drawImageCover(ctx, cachedImg, thumbX, thumbY, thumbSize, thumbSize);
        ctx.restore();
      } else {
        var palette = getCardPalette(item.name);
        var grad = ctx.createLinearGradient(thumbX, thumbY, thumbX + thumbSize, thumbY + thumbSize);
        grad.addColorStop(0, palette[0]);
        grad.addColorStop(1, palette[1]);
        ctx.fillStyle = grad;
        this.roundRect(ctx, thumbX, thumbY, thumbSize, thumbSize, thumbR);
        ctx.fill();
        ctx.font = '700 ' + Math.round(thumbSize * 0.35) + 'px "DM Sans", sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(item.name.charAt(0).toUpperCase(), thumbX + thumbSize / 2, thumbY + thumbSize / 2);
        ctx.textAlign = 'left';
      }

      // Isim — gorselin saginda, dikeyde ortali
      var nameX = thumbX + thumbSize + gap;
      var nameMaxW = contentW - thumbSize - gap - 4;
      var nameSize = isFinal ? 24 : 18;
      ctx.font = '600 ' + nameSize + 'px "DM Sans", sans-serif';
      ctx.fillStyle = '#1a1a1a';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      var nameText = item.name;
      if (ctx.measureText(nameText).width > nameMaxW) {
        while (ctx.measureText(nameText + '...').width > nameMaxW && nameText.length > 1) {
          nameText = nameText.slice(0, -1);
        }
        nameText += '...';
      }
      ctx.fillText(nameText, nameX, cy);
    }
  },

  _drawShuffleArea: function(ctx, cx, cy) {
    var cardW = 400, cardH = 540, cardR = 36;
    var isCardVisible = $('cardStack').style.display !== 'none';

    if (!isCardVisible) {
      var phText = state.available.length === 0 ? 'BITTI' : 'KARISTIR';
      var phX = cx - cardW / 2;
      var phY = cy - cardH / 2;

      ctx.setLineDash([10, 7]);
      ctx.strokeStyle = '#e0ddd7';
      ctx.lineWidth = 3.5;
      this.roundRect(ctx, phX, phY, cardW, cardH, cardR);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.font = '500 22px "JetBrains Mono", monospace';
      ctx.fillStyle = '#a8a29e';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(phText, cx, cy);
      ctx.textAlign = 'left';
      return;
    }

    var shadows = [
      { dy: 10, scale: 0.96, rot: -1, alpha: 0.5 },
      { dy: 20, scale: 0.92, rot: 1.2, alpha: 0.25 },
      { dy: 30, scale: 0.88, rot: -0.5, alpha: 0.1 }
    ];
    for (var s = shadows.length - 1; s >= 0; s--) {
      var sh = shadows[s];
      ctx.save();
      ctx.globalAlpha = sh.alpha;
      var shW = cardW * sh.scale;
      var shH = cardH * sh.scale;
      ctx.translate(cx, cy + sh.dy);
      ctx.rotate(sh.rot * Math.PI / 180);
      ctx.fillStyle = '#ffffff';
      this.roundRect(ctx, -shW / 2, -shH / 2, shW, shH, cardR * sh.scale);
      ctx.fill();
      ctx.strokeStyle = '#eae7e2';
      ctx.lineWidth = 1.5;
      this.roundRect(ctx, -shW / 2, -shH / 2, shW, shH, cardR * sh.scale);
      ctx.stroke();
      ctx.restore();
    }

    var displayItem = this._displayItem;
    if (!displayItem) return;

    ctx.save();

    if (state.isShuffling) {
      ctx.translate(cx, cy);
      ctx.rotate((Math.random() - 0.5) * 3 * Math.PI / 180);
      ctx.translate(-cx, -cy);
    }

    var cardX = cx - cardW / 2;
    var cardY = cy - cardH / 2;

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.12)';
    ctx.shadowBlur = 40;
    ctx.shadowOffsetY = 12;
    ctx.fillStyle = '#ffffff';
    this.roundRect(ctx, cardX, cardY, cardW, cardH, cardR);
    ctx.fill();
    ctx.restore();

    var nameAreaH = 64;
    var imgAreaH = cardH - nameAreaH;

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cardX + cardR, cardY);
    ctx.arcTo(cardX + cardW, cardY, cardX + cardW, cardY + imgAreaH, cardR);
    ctx.lineTo(cardX + cardW, cardY + imgAreaH);
    ctx.lineTo(cardX, cardY + imgAreaH);
    ctx.arcTo(cardX, cardY, cardX + cardW, cardY, cardR);
    ctx.closePath();
    ctx.clip();

    var cachedImg = displayItem.image ? this.imageCache[displayItem.image] : null;
    if (cachedImg) {
      this.drawImageCover(ctx, cachedImg, cardX, cardY, cardW, imgAreaH);
    } else {
      var palette = getCardPalette(displayItem.name);
      var grad = ctx.createLinearGradient(cardX, cardY, cardX + cardW, cardY + imgAreaH);
      grad.addColorStop(0, palette[0]);
      grad.addColorStop(1, palette[1]);
      ctx.fillStyle = grad;
      ctx.fillRect(cardX, cardY, cardW, imgAreaH);

      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.15)';
      ctx.shadowBlur = 12;
      ctx.shadowOffsetY = 2;
      ctx.font = '700 128px "DM Sans", sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(displayItem.name.charAt(0).toUpperCase(), cardX + cardW / 2, cardY + imgAreaH / 2);
      ctx.restore();
      ctx.textAlign = 'left';
    }
    ctx.restore();

    var nameY = cardY + imgAreaH;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cardX, nameY);
    ctx.lineTo(cardX + cardW, nameY);
    ctx.arcTo(cardX + cardW, cardY + cardH, cardX, cardY + cardH, cardR);
    ctx.arcTo(cardX, cardY + cardH, cardX, nameY, cardR);
    ctx.closePath();
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.restore();

    ctx.strokeStyle = '#eae7e2';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cardX, nameY);
    ctx.lineTo(cardX + cardW, nameY);
    ctx.stroke();

    ctx.font = '700 30px "DM Sans", sans-serif';
    ctx.fillStyle = '#1a1a1a';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    var cardNameText = displayItem.name;
    if (cardNameText.length > 20) cardNameText = cardNameText.substring(0, 20) + '...';
    ctx.fillText(cardNameText, cx, nameY + nameAreaH / 2);
    ctx.textAlign = 'left';

    if (state.isRevealed && state.currentCard) {
      var hdrColor = this.getHeaderColor();
      ctx.save();
      ctx.globalAlpha = 0.15;
      ctx.strokeStyle = hdrColor;
      ctx.lineWidth = 8;
      this.roundRect(ctx, cardX - 4, cardY - 4, cardW + 8, cardH + 8, cardR + 4);
      ctx.stroke();
      ctx.restore();
    }

    ctx.restore();

    if ($('selectPrompt').classList.contains('visible')) {
      var arrowY = cy + cardH / 2 + 35;
      ctx.fillStyle = '#ede9fe';
      ctx.beginPath();
      ctx.arc(cx, arrowY, 20, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#7c5cfc';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx - 6, arrowY - 3);
      ctx.lineTo(cx, arrowY + 4);
      ctx.lineTo(cx + 6, arrowY - 3);
      ctx.stroke();
    }

  },

  _drawFlyingCard: function(ctx) {
    var fc = this._flyingCard;
    if (!fc) return;
    var elapsed = Date.now() - fc.startTime;
    var t = Math.min(elapsed / fc.duration, 1);
    if (t >= 1) { this._flyingCard = null; return; }

    // easeInOutCubic
    var ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;

    var x = fc.fromX + (fc.toX - fc.fromX) * ease;
    var y = fc.fromY + (fc.toY - fc.fromY) * ease;
    var w = fc.fromW + (fc.toW - fc.fromW) * ease;
    var h = fc.fromH + (fc.toH - fc.fromH) * ease;
    var alpha = 1 - t * 0.4;
    var r = 24 - 12 * ease;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = 'rgba(0,0,0,0.15)';
    ctx.shadowBlur = 20 * (1 - t);
    ctx.shadowOffsetY = 8 * (1 - t);

    // Kart arka plani
    ctx.fillStyle = '#ffffff';
    this.roundRect(ctx, x, y, w, h, r);
    ctx.fill();
    ctx.restore();

    // Gorsel/gradient
    var item = fc.item;
    var imgH = h * 0.82;
    ctx.save();
    this.roundRect(ctx, x, y, w, imgH, r);
    ctx.clip();
    var cachedImg = item.image ? this.imageCache[item.image] : null;
    if (cachedImg) {
      this.drawImageCover(ctx, cachedImg, x, y, w, imgH);
    } else {
      var palette = getCardPalette(item.name);
      var grad = ctx.createLinearGradient(x, y, x + w, y + imgH);
      grad.addColorStop(0, palette[0]);
      grad.addColorStop(1, palette[1]);
      ctx.fillStyle = grad;
      ctx.fillRect(x, y, w, imgH);
      if (w > 60) {
        ctx.font = '700 ' + Math.round(Math.min(w, h) * 0.3) + 'px "DM Sans", sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(item.name.charAt(0).toUpperCase(), x + w/2, y + imgH/2);
        ctx.textAlign = 'left';
      }
    }
    ctx.restore();

    // Isim (yeterli alan varsa)
    if (h - imgH > 10 && w > 60) {
      ctx.font = '600 ' + Math.round(Math.max(12, w * 0.07)) + 'px "DM Sans", sans-serif';
      ctx.fillStyle = '#1a1a1a';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(item.name, x + w/2, y + imgH + (h - imgH)/2);
      ctx.textAlign = 'left';
    }
  },

  _drawCameraPip: function(ctx, W, H) {
    if (!Recorder.camEnabled || !Recorder.camStream) return;
    var pipEl = $('cameraPip');
    if (!pipEl || pipEl.readyState < 2) return;

    var size = 180;
    var margin = 40;
    var cx = W - margin - size / 2;
    var cy = H - margin - size / 2;

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, size / 2, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();

    // Video'yu kare olarak ortadan kırp
    var vw = pipEl.videoWidth;
    var vh = pipEl.videoHeight;
    var side = Math.min(vw, vh);
    var sx = (vw - side) / 2;
    var sy = (vh - side) / 2;
    ctx.drawImage(pipEl, sx, sy, side, side, cx - size / 2, cy - size / 2, size, size);
    ctx.restore();

    // Beyaz border
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.arc(cx, cy, size / 2, 0, Math.PI * 2);
    ctx.stroke();
  }
};

/* ================================================================
   VIDEO KAYIT — Canvas + MediaRecorder
   ================================================================ */

var Recorder = {
  isRecording: false,
  mediaRecorder: null,
  chunks: [],
  canvas: null,
  canvasCtx: null,
  animFrameId: null,
  startTime: 0,
  timerInterval: null,
  micStream: null,
  micEnabled: true,
  camStream: null,
  camEnabled: false,
  camVideo: null,

  init: function() {
    this.canvas = document.createElement('canvas');
    this.canvas.width = 1080;
    this.canvas.height = 1920;
    this.canvasCtx = this.canvas.getContext('2d');
  },

  startCountdown: function(callback) {
    var overlay = $('countdownOverlay');
    var numEl = $('countdownNumber');
    overlay.classList.add('visible');

    var count = 3;
    numEl.textContent = count;
    numEl.style.animation = 'none';
    void numEl.offsetWidth;
    numEl.style.animation = '';

    var interval = setInterval(function() {
      count--;
      if (count > 0) {
        numEl.textContent = count;
        numEl.style.animation = 'none';
        void numEl.offsetWidth;
        numEl.style.animation = '';
      } else {
        clearInterval(interval);
        overlay.classList.remove('visible');
        callback();
      }
    }, 1000);
  },

  start: function() {
    var self = this;
    if (!this.canvas) this.init();
    SFX.ensureCtx();

    // Gorselleri onceden yukle, sonra direkt kayda basla
    // (Intro varsa intro oynar, yoksa countdown canvas uzerinde cizilir)
    CanvasRenderer.preloadImages(function() {
      self._beginRecording();
    });
  },

  _beginRecording: function() {
    var self = this;
    this.isRecording = true;
    this.chunks = [];
    this.startTime = Date.now();

    // UI guncelle
    $('recIndicator').classList.add('visible');
    $('recStartStop').classList.add('recording');

    // Timer
    this.timerInterval = setInterval(function() {
      var elapsed = Math.floor((Date.now() - self.startTime) / 1000);
      var min = String(Math.floor(elapsed / 60)).padStart(2, '0');
      var sec = String(elapsed % 60).padStart(2, '0');
      $('recTime').textContent = min + ':' + sec;
    }, 1000);

    var ctx = this.canvasCtx;

    // Faz: 'intro' -> 'game' (countdown kaldirildi)
    var phase = (CONFIG.introStyle !== 'none') ? 'intro' : 'game';
    var phaseOverlay = $('recPhaseOverlay');
    var phaseLabel = $('recPhaseLabel');
    var phaseTimer = $('recPhaseTimer');

    // DOM overlay'i guncelle
    var updatePhaseUI = function(p, text) {
      if (p !== 'game') {
        phaseOverlay.classList.add('visible');
        phaseLabel.textContent = text || '';
      } else {
        phaseOverlay.classList.remove('visible');
      }
    };

    var captureLoop = function() {
      if (!self.isRecording) return;

      try {
        if (phase === 'intro' && IntroRenderer.isPlaying) {
          IntroRenderer.drawFrame(ctx);
          var introRemain = Math.ceil((CONFIG.introDuration - (Date.now() - IntroRenderer.startTime)) / 1000);
          phaseLabel.textContent = 'Intro kaydediliyor';
          phaseTimer.textContent = introRemain > 0 ? introRemain : '';
        } else if (phase === 'intro' && !IntroRenderer.isPlaying) {
          phase = 'game';
          updatePhaseUI('game');
        }

        if (phase === 'game') {
          CanvasRenderer.drawFrame(ctx);
        }
      } catch (e) {
        console.error('[Recorder] captureLoop hatasi:', e);
      }

      self.animFrameId = requestAnimationFrame(captureLoop);
    };

    if (phase === 'intro') {
      IntroRenderer.start(function() {});
      updatePhaseUI('intro', 'Intro kaydediliyor');
    } else {
      updatePhaseUI('game');
    }

    captureLoop();

    // Canvas stream (30fps)
    var canvasStream = this.canvas.captureStream(30);

    // Ses mix — Web Audio API ile duzgun miksleme
    var audioCtx = SFX.ctx;
    var mixerDest = audioCtx.createMediaStreamDestination();

    // SFX sesini mixer'a bagla (gain yukselterek)
    if (SFX.masterGain) {
      var sfxGain = audioCtx.createGain();
      sfxGain.gain.value = 0.5;
      SFX.masterGain.connect(sfxGain);
      sfxGain.connect(mixerDest);
      self._sfxGainNode = sfxGain;
    }

    // Mikrofon sesini mixer'a bagla
    if (this.micEnabled && this.micStream) {
      var micSource = audioCtx.createMediaStreamSource(this.micStream);
      var micGain = audioCtx.createGain();
      micGain.gain.value = 1.0;
      micSource.connect(micGain);
      micGain.connect(mixerDest);
      self._micSource = micSource;
      self._micGainNode = micGain;
    }

    var allTracks = canvasStream.getVideoTracks().concat(mixerDest.stream.getAudioTracks());
    var combinedStream = new MediaStream(allTracks);

    // Codec destegi
    var mimeType = 'video/webm;codecs=vp9,opus';
    if (!MediaRecorder.isTypeSupported(mimeType)) {
      mimeType = 'video/webm;codecs=vp8,opus';
    }
    if (!MediaRecorder.isTypeSupported(mimeType)) {
      mimeType = 'video/webm';
    }

    this.mediaRecorder = new MediaRecorder(combinedStream, {
      mimeType: mimeType,
      videoBitsPerSecond: 8000000
    });

    this.mediaRecorder.ondataavailable = function(e) {
      if (e.data.size > 0) self.chunks.push(e.data);
    };

    this.mediaRecorder.onstop = function() {
      var blob = new Blob(self.chunks, { type: 'video/webm' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'karistir-' + new Date().toISOString().slice(0, 10) + '.webm';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      self.chunks = [];
      showToast('Video indirildi!');
    };

    this.mediaRecorder.start(100);
  },

  _drawCountdown: function(ctx, num, fractional) {
    var W = 1080, H = 1920;

    // Oyun ekranini arka planda ciz (hafif bulanik his icin)
    CanvasRenderer.drawFrame(ctx);

    // Kararti overlay
    if (!CONFIG.transparentBg) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, W, H);
    }

    // Rakam animasyonu — baslangicta buyuk, kuculerek sabitlenir
    var scale = 1.3 - 0.3 * fractional;
    var alpha = fractional < 0.15 ? fractional / 0.15 : (fractional > 0.85 ? (1 - fractional) / 0.15 : 1);
    alpha = Math.min(alpha, 1);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(W / 2, H / 2);
    ctx.scale(scale, scale);
    ctx.font = '800 160px "JetBrains Mono", monospace';
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = 30;
    ctx.fillText(String(num), 0, 0);
    ctx.restore();
  },

  stop: function() {
    this.isRecording = false;

    if (this.animFrameId) {
      cancelAnimationFrame(this.animFrameId);
      this.animFrameId = null;
    }

    if (this.timerInterval) {
      clearInterval(this.timerInterval);
      this.timerInterval = null;
    }

    if (this.mediaRecorder && this.mediaRecorder.state !== 'inactive') {
      this.mediaRecorder.stop();
    }

    // Audio node'lari temizle
    if (this._sfxGainNode) {
      SFX.masterGain.disconnect(this._sfxGainNode);
      this._sfxGainNode.disconnect();
      this._sfxGainNode = null;
    }
    if (this._micSource) {
      this._micSource.disconnect();
      this._micSource = null;
    }
    if (this._micGainNode) {
      this._micGainNode.disconnect();
      this._micGainNode = null;
    }

    // Intro durdur
    IntroRenderer.isPlaying = false;

    // Kamera durdur
    if (this.camStream) {
      this.camStream.getTracks().forEach(function(t) { t.stop(); });
      this.camStream = null;
    }
    this.camEnabled = false;
    var pipEl = $('cameraPip');
    if (pipEl) { pipEl.classList.remove('active'); pipEl.srcObject = null; }
    $('recCamToggle').style.opacity = '0.5';

    // Phase overlay gizle
    $('recPhaseOverlay').classList.remove('visible');

    // UI temizle
    $('recIndicator').classList.remove('visible');
    $('recStartStop').classList.remove('recording');
    $('recTime').textContent = '00:00';
  },

  requestMic: function() {
    var self = this;
    return navigator.mediaDevices.getUserMedia({ audio: true })
      .then(function(stream) {
        self.micStream = stream;
        return true;
      })
      .catch(function() {
        self.micEnabled = false;
        showToast('Mikrofon erisimi reddedildi');
        return false;
      });
  },

  toggleMic: function() {
    this.micEnabled = !this.micEnabled;
    if (this.micStream) {
      this.micStream.getAudioTracks().forEach(function(t) {
        t.enabled = Recorder.micEnabled;
      });
    }
    return this.micEnabled;
  },

  toggleCam: function() {
    var self = this;
    var pipEl = $('cameraPip');
    if (this.camEnabled) {
      // Kapat
      this.camEnabled = false;
      pipEl.classList.remove('active');
      if (this.camStream) {
        this.camStream.getTracks().forEach(function(t) { t.stop(); });
        this.camStream = null;
      }
      pipEl.srcObject = null;
      return Promise.resolve(false);
    }
    // Ac
    return navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 320, facingMode: 'user' } })
      .then(function(stream) {
        self.camStream = stream;
        self.camEnabled = true;
        pipEl.srcObject = stream;
        pipEl.classList.add('active');
        return true;
      })
      .catch(function() {
        showToast('Kamera erisimi reddedildi');
        return false;
      });
  }
};
